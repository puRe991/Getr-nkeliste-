name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci

      - name: Configure Supabase environment
        run: |
          cat > .env << 'EOF'
          VITE_SUPABASE_URL=https://gsedfrkkxvxzrqlyyryq.supabase.co
          VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzZWRmcmtreHZ4enJxbHl5cnlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MTQwMjIsImV4cCI6MjA5OTI5MDAyMn0.Mane4dj3Gmxtw9p3sdrJlJlarRxU2tCS-LxXzb4YyUs
          VITE_APP_NAME=Getränkekasse
          EOF

      - name: Build debug APK
        run: npm run android:apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: getraenkekasse-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
